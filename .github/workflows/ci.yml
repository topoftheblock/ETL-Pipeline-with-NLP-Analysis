name: Java CI/CD Pipeline with Security & Quality

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-secure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud requires full git history for accurate blame/analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Runs the OWASP Dependency-Check before compiling
      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -B

      # Uploads the HTML report generated by OWASP so you can review the vulnerabilities manually
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always() # Ensures the report is uploaded even if the build fails due to a high CVSS score
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7

      # Builds the application and runs unit/integration tests
      - name: Build and Test with Maven
        run: mvn clean verify -B

      # Executes SonarCloud analysis
      # NOTE: You MUST update the sonar.projectKey and sonar.organization below
      # to match the ones generated when you link your repo to SonarCloud.io!
      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Provided automatically by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # You must add this token to GitHub Secrets
        run: >
          mvn sonar:sonar 
          -Dsonar.projectKey=YOUR_SONAR_PROJECT_KEY 
          -Dsonar.organization=YOUR_SONAR_ORGANIZATION 
          -Dsonar.host.url=https://sonarcloud.io
          -B

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppr-app-artifact
          path: target/*.jar
          retention-days: 7